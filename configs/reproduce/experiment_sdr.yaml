experiment:
  output_path: experiments/SDR/retrospective
  testset: mixed_testset_large # sax_testset # lax_testset
  ser: False
  store_all: False
  ablations:
    data.undersampling_factor: [4, 8, 12, 16]
    data.seed: [1996, 2026, 42, 1234, 1697]

model:
  baseline: PDDR
  path: models/SpatialDiffusionPrior
  checkpoint: model.pt
  unet_type: SpatioTemporalUNetModel
  initialization: zero_filled

data:
  ocmr_realtime: False
  repeat_cycle: 0
  undersample: True
  undersampling_type: ktGaussian
  undersampling_factor: 12
  alpha: 0.28
  seed: 1996

optimizer:
  lr: 1.0
  lr_scheduler: True
  lr_scheduler_factor: 0.25
  lr_scheduler_patience: 50

variation:
  optim_steps: 200 # [100, 200, 400] # ->  change lr_scheduler_patience accordingly
  reg_param: 0.03
  take_slab: True
  slab_size: 36
  slab_sampling: sliding_window
  timestep_factor: 0.4
  accumulation_steps: 1
  time_sampling: descending
  consistency_loss: l2
  regularization_loss: l2


